apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  namespace: debate-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-ui
  template:
    metadata:
      labels:
        app: web-ui
    spec:
      containers:
      - name: web-ui
        image: web-ui:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        env:
        - name: ORCHESTRATOR_URL
          value: "http://orchestrator-svc:8080"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: web-ui-svc
  namespace: debate-agents
spec:
  selector:
    app: web-ui
  ports:
  - port: 80
    targetPort: 5000
  type: NodePort
