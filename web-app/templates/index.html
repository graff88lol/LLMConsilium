<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debate Agents - AI Code Review System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        input[type="number"] {
            width: 100px;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .result {
            display: none;
        }
        
        .code-block {
            background: #f4f4f4;
            border-radius: 8px;
            padding: 15px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.5;
        }
        
        .round {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        
        .round h4 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .critique {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            flex: 1;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .stats {
                flex-direction: column;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Debate Agents</h1>
            <p>AI-powered code generation with security review</p>
        </div>
        
        <div class="card">
            <div class="input-group">
                <label>📝 Задача для генерации кода</label>
                <textarea id="task" rows="4" placeholder="Например: напиши функцию для сортировки массива пузырьком"></textarea>
            </div>
            
            <div class="input-group">
                <label>🔄 Максимальное количество раундов дебатов</label>
                <input type="number" id="rounds" min="1" max="5" value="2">
            </div>
            
            <button onclick="startDebate()">🚀 Начать дебаты</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px;">Генерация кода и проверка безопасности...</p>
        </div>
        
        <div class="result card" id="result">
            <h3>📊 Результаты дебатов</h3>
            <div class="stats" id="stats"></div>
            
            <h3>💻 Финальный код</h3>
            <div class="code-block" id="finalCode"></div>
            
            <h3>📜 История дебатов</h3>
            <div id="history"></div>
        </div>
    </div>
    
    <script>
        async function startDebate() {
            const task = document.getElementById('task').value;
            const maxRounds = document.getElementById('rounds').value;
            
            if (!task.trim()) {
                alert('Пожалуйста, введите задачу');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            
            try {
                const response = await fetch('/api/debate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        task: task,
                        max_rounds: parseInt(maxRounds)
                    })
                });
                
                const data = await response.json();
                displayResults(data);
            } catch (error) {
                alert('Ошибка: ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function displayResults(data) {
            if (data.error) {
                alert('Ошибка: ' + data.error);
                return;
            }
            
            // Статистика
            const statsHtml = `
                <div class="stat">
                    <div class="stat-value">${data.rounds || 0}</div>
                    <div class="stat-label">Проведено раундов</div>
                </div>
                <div class="stat">
                    <div class="stat-value">${data.history ? data.history.length : 0}</div>
                    <div class="stat-label">Итераций исправлений</div>
                </div>
            `;
            document.getElementById('stats').innerHTML = statsHtml;
            
            // Финальный код
            const finalCode = data.final_code || '// Код не сгенерирован';
            document.getElementById('finalCode').innerHTML = `<pre>${escapeHtml(finalCode)}</pre>`;
            
            // История
            let historyHtml = '';
            if (data.history && data.history.length > 0) {
                data.history.forEach((round, index) => {
                    historyHtml += `
                        <div class="round">
                            <h4>🔁 Раунд ${round.round || index + 1}</h4>
                            <strong>📝 Сгенерированный код:</strong>
                            <div class="code-block"><pre>${escapeHtml(round.code || '// Нет кода')}</pre></div>
                            <div class="critique">
                                <strong>🔍 Критика security expert:</strong>
                                <div style="margin-top: 10px;">${escapeHtml(round.critique || 'Нет критики')}</div>
                            </div>
                        </div>
                    `;
                });
            } else {
                historyHtml = '<p>Нет истории дебатов</p>';
            }
            document.getElementById('history').innerHTML = historyHtml;
            
            document.getElementById('result').style.display = 'block';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Check health on load
        async function checkHealth() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                if (data.status !== 'ok') {
                    console.warn('Orchestrator not healthy');
                }
            } catch (error) {
                console.error('Health check failed:', error);
            }
        }
        
        checkHealth();
    </script>
</body>
</html>
