apiVersion: apps/v1
kind: Deployment
metadata:
  name: critic
  namespace: debate-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: critic
  template:
    metadata:
      labels:
        app: critic
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            ollama serve &
            sleep 10
            ollama pull qwen2.5-coder:1.5b
            wait
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "3Gi"
            cpu: "2000m"
        ports:
        - containerPort: 11434
---
apiVersion: v1
kind: Service
metadata:
  name: critic-svc
  namespace: debate-agents
spec:
  selector:
    app: critic
  ports:
  - port: 11434
    targetPort: 11434
