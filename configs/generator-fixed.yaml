apiVersion: apps/v1
kind: Deployment
metadata:
  name: generator
  namespace: debate-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: generator
  template:
    metadata:
      labels:
        app: generator
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            ollama serve &
            sleep 10
            ollama pull deepseek-coder:1.3b
            wait
        resources:
          requests:
            memory: "4Gi"
            cpu: "1"
        ports:
        - containerPort: 11434
---
apiVersion: v1
kind: Service
metadata:
  name: generator-svc
  namespace: debate-agents
spec:
  selector:
    app: generator
  ports:
  - port: 11434
    targetPort: 11434
